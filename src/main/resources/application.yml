server:
  port: 8089

spring:
  application:
    name: taxinvoice-pdf-generation-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taxinvoicepdf_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Apache Camel
camel:
  springboot:
    name: taxinvoice-pdf-generation-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true
  component:
    kafka:
      brokers: ${KAFKA_BROKERS:localhost:9092}

# Application-specific configuration
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: taxinvoice-pdf-generation-service
    topics:
      saga-command-tax-invoice-pdf: saga.command.tax-invoice-pdf
      saga-compensation-tax-invoice-pdf: saga.compensation.tax-invoice-pdf
      xml-stored: xml.stored
      pdf-generated-tax-invoice: pdf.generated.tax-invoice
      pdf-signing-requested: pdf.signing.requested
      dlq: pdf.generation.tax-invoice.dlq
  pdf:
    storage:
      path: ${PDF_STORAGE_PATH:/var/documents/taxinvoices}
      base-url: ${PDF_STORAGE_BASE_URL:http://localhost:8084}
  storage:
    fetch:
      enabled: ${STORAGE_FETCH_ENABLED:true}

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.wpanther.taxinvoice.pdf: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.apache.fop: INFO
    org.apache.pdfbox: INFO
